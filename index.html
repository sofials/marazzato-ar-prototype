<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Museo Marazzato — Three Timelines</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>

  <!-- Schermata intro -->
  <div id="intro">
    <h1>THREE TIMELINES</h1>
    <p class="subtitle">Una cornice. Tre tempi.</p>
    <p class="instructions">
      Tappa <strong>INIZIA</strong> e inquadra il marker.
    </p>
    <button id="start-btn">INIZIA</button>
  </div>

  <!-- Hint quando cerca il marker -->
  <div id="scan-hint" class="hidden">Inquadra il marker</div>

  <!-- Ghiera timeline -->
<div id="timeline-dial" class="hidden">
  <svg viewBox="0 0 240 140" id="dial-svg">
    <!-- arco di sfondo -->
    <path d="M 30 120 A 90 90 0 0 1 210 120"
          fill="none" stroke="#333333" stroke-width="2" opacity="0.3"/>

    <!-- tre tacche con label -->
    <g id="tick-past">
      <circle cx="30" cy="120" r="14" fill="#F4F1EA" stroke="#333333" stroke-width="2"/>
      <text x="30" y="125" text-anchor="middle" font-family="sans-serif"
            font-size="11" font-weight="700" fill="#333333" letter-spacing="1">P</text>
    </g>

    <g id="tick-present">
      <circle cx="120" cy="30" r="14" fill="#F4F1EA" stroke="#333333" stroke-width="2"/>
      <text x="120" y="35" text-anchor="middle" font-family="sans-serif"
            font-size="11" font-weight="700" fill="#333333" letter-spacing="1">●</text>
    </g>

    <g id="tick-future">
      <circle cx="210" cy="120" r="14" fill="#F4F1EA" stroke="#333333" stroke-width="2"/>
      <text x="210" y="125" text-anchor="middle" font-family="sans-serif"
            font-size="11" font-weight="700" fill="#333333" letter-spacing="1">F</text>
    </g>

    <!-- lancetta -->
    <line id="needle" x1="120" y1="120" x2="120" y2="40"
          stroke="#333333" stroke-width="4" stroke-linecap="round"/>
    <circle cx="120" cy="120" r="8" fill="#333333"/>
  </svg>

  <div id="dial-label">PRESENTE</div>
</div>

  <!-- Scena AR con marker di test MindAR -->
  <a-scene mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
           color-space="sRGB"
           renderer="colorManagement: true, physicallyCorrectLights"
           vr-mode-ui="enabled: false"
           device-orientation-permission-ui="enabled: false">

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <!-- Cubo placeholder: lo sostituiremo con la cornice -->
      <a-box id="placeholder"
             position="0 0 0.1"
             rotation="0 0 0"
             width="0.6"
             height="0.4"
             depth="0.05"
             color="#C72A09"></a-box>
    </a-entity>
  </a-scene>

  <script src="script.js"></script>
</body>
</html>
