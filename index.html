<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Museo Marazzato — Three Timelines</title>
  
  <!-- Barlow Condensed Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <!-- Custom Script pre-caricato per registrare i componenti A-Frame prima della scena -->
  <script src="script.js" defer></script>
</head>
<body>

  <!-- Logo Overlay (Placeholder) -->
  <div id="logo-overlay">MM</div>

  <!-- Schermata intro -->
  <div id="intro">
    <div class="intro-card">
      <img src="assets/logo.png" alt="Logo Museo Marazzato" class="intro-logo">

      <h1>THREE TIMELINES</h1>
      <p class="subtitle">Scopri le storie oltre la cenere </p>

      <p class="instructions">Tappa <strong>INIZIA</strong> e inquadra i marker presenti in sala.</p>

      <button id="start-btn">INIZIA</button>
    </div>
  </div>

  <!-- Hint quando cerca il marker -->
  <div id="scan-hint" class="hidden">INQUADRA IL MARKER</div>

  <!-- Ghiera timeline -->
  <div id="timeline-dial" class="hidden">
    <svg viewBox="0 0 240 140" id="dial-svg">
      <path d="M 30 120 A 90 90 0 0 1 210 120" fill="none" stroke="#333333" stroke-width="2" opacity="0.3"/>
      
      <g id="tick-past">
        <circle cx="30" cy="120" r="14" fill="#F4F1EA" stroke="#333333" stroke-width="2"/>
        <text x="30" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="#333333">P</text>
      </g>
      
      <g id="tick-present" class="active">
        <circle cx="120" cy="30" r="14" fill="#333333" stroke="#333333" stroke-width="2"/>
        <text x="120" y="35" text-anchor="middle" font-size="14" font-weight="700" fill="#F4F1EA">●</text>
      </g>
      
      <g id="tick-future">
        <circle cx="210" cy="120" r="14" fill="#F4F1EA" stroke="#333333" stroke-width="2"/>
        <text x="210" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="#333333">F</text>
      </g>
      
      <line id="needle" x1="120" y1="120" x2="120" y2="40" stroke="#333333" stroke-width="4" stroke-linecap="round"/>
      <circle cx="120" cy="120" r="8" fill="#333333"/>
    </svg>
    <div id="dial-label">PRESENTE</div>
  </div>

  <div id="photo-caption" class="hidden">
    Alassio, agosto — 1971
  </div>

  <!-- DEBUG: Fine-tuning AR in tempo reale -->
  <div id="ar-debugger" style="position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.9); color: #00ffcc; padding: 15px; border-radius: 8px; z-index: 9999; font-family: monospace; font-size: 13px; width: 220px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
    <div style="margin-bottom: 12px; font-weight: bold; border-bottom: 1px solid #444; padding-bottom: 5px;">AR FINE-TUNING</div>
    <label>OGGETTO:</label>
    <select id="select-target" style="width: 100%; background: #222; color: white; border: 1px solid #555; margin-bottom: 15px; padding: 3px;">
      <option value="vase-wrapper">TUTTI I VASI (Insieme)</option>
      <option value="vase-past">VASO (Passato)</option>
      <option value="vase-present">VASO (Presente)</option>
      <option value="vase-future">VASO (Futuro)</option>
      <option value="frame-wrapper">FOTO (2D)</option>
    </select>
    <label>X (Lat): <span id="val-x">0</span></label><br>
    <input type="range" id="slide-x" min="-3" max="3" step="0.1" value="0" style="width: 100%; margin-bottom: 10px;"><br>
    <label>Y (Alt): <span id="val-y">0</span></label><br>
    <input type="range" id="slide-y" min="-3" max="3" step="0.1" value="0" style="width: 100%; margin-bottom: 10px;"><br>
    <label>Z (Prof): <span id="val-z">0</span></label><br>
    <input type="range" id="slide-z" min="-5" max="5" step="0.1" value="0" style="width: 100%; margin-bottom: 10px;"><br>
    <label>Scale: <span id="val-s">1</span></label><br>
    <input type="range" id="slide-s" min="0.1" max="15" step="0.1" value="1" style="width: 100%; margin-bottom: 10px;"><br>
    <div style="margin-top: 10px; color: #aaa; font-size: 11px;">HTML da copiare:</div>
    <textarea id="val-final" style="width: 100%; background: #111; color: #0f0; border: none; font-size: 11px; height: 40px; margin-top: 5px; padding: 5px;"></textarea>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const sel = document.getElementById('select-target');
      const sx = document.getElementById('slide-x'), vx = document.getElementById('val-x');
      const sy = document.getElementById('slide-y'), vy = document.getElementById('val-y');
      const sz = document.getElementById('slide-z'), vz = document.getElementById('val-z');
      const ss = document.getElementById('slide-s'), vs = document.getElementById('val-s');
      const vFinal = document.getElementById('val-final');

      const ALL_VASES = ['vase-past', 'vase-present', 'vase-future'];

      function getTargets() {
        if (sel.value === 'vase-wrapper') {
          return ALL_VASES.map(id => document.getElementById(id)).filter(Boolean);
        }
        const el = document.getElementById(sel.value);
        return el ? [el] : [];
      }

      function updateTransform() {
        const targets = getTargets();
        if (!targets.length) return;
        const x = sx.value, y = sy.value, z = sz.value, s = ss.value;
        vx.innerText = x; vy.innerText = y; vz.innerText = z; vs.innerText = s;
        vFinal.value = `position="${x} ${y} ${z}" scale="${s} ${s} ${s}"`;
        targets.forEach(el => {
          el.setAttribute('position', `${x} ${y} ${z}`);
          el.setAttribute('scale', `${s} ${s} ${s}`);
        });
      }

      sel.addEventListener('change', () => {
        const ref = document.getElementById(
          sel.value === 'vase-wrapper' ? 'vase-present' : sel.value
        );
        if (!ref) return;
        const pos = ref.getAttribute('position');
        const sca = ref.getAttribute('scale');
        sx.value = pos.x; sy.value = pos.y; sz.value = pos.z;
        ss.value = sca.x;
        updateTransform();
      });

      [sx, sy, sz, ss].forEach(slider => slider.addEventListener('input', updateTransform));
    });
  </script>

  <!-- Scena AR -->
  <a-scene mindar-image="imageTargetSrc: assets/targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no; filterMinCF: 0.0001; filterBeta: 0.001;"
           color-space="sRGB"
           renderer="colorManagement: true; physicallyCorrectLights: true; antialias: false;"
           vr-mode-ui="enabled: false"
           device-orientation-permission-ui="enabled: false">

    <a-assets>
      <img id="tex-past" src="textures/past.jpg">
      <img id="tex-present" src="textures/present.jpg">
      <img id="tex-future" src="textures/future.jpg">

      <a-asset-item id="vaso-past-glb" src="models/vaso-past.glb"></a-asset-item>
      <a-asset-item id="vaso-present-glb" src="models/vaso-present.glb"></a-asset-item>
      <a-asset-item id="vaso-future-glb" src="models/vaso-future.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity light="type: hemisphere; color: #ffffff; groundColor: #bbbbbb; intensity: 1"></a-entity>
    <a-entity light="type: directional; color: #ffffff; intensity: 0.6" position="0.5 1 1"></a-entity>

    <!-- Target 1: Vaso (scala aumentata, offset Y/Z per appoggiarsi al piano) -->
    <a-entity mindar-image-target="targetIndex: 1" id="ar-target-vase">
      <a-entity id="vase-wrapper" position="0 0.3 0" scale="6 6 6">
        <a-gltf-model id="vase-past"    src="#vaso-past-glb"    visible="false" model-opacity="opacity: 0"></a-gltf-model>
        <a-gltf-model id="vase-present" src="#vaso-present-glb" visible="true"  model-opacity="opacity: 1"></a-gltf-model>
        <a-gltf-model id="vase-future"  src="#vaso-future-glb"  visible="false" model-opacity="opacity: 0"></a-gltf-model>
      </a-entity>
    </a-entity>

    <!-- Target 0: Foto (offset X per non coprire il marker, transparent per il fade) -->
    <a-entity mindar-image-target="targetIndex: 0" id="ar-target-photo">
      <a-entity id="frame-wrapper" scale="2.5 2.5 2.5" position="1.2 -1.2 0">
        <a-plane id="photo-plane" src="#tex-present" position="0 0 0" width="1.2" height="0.8" material="shader: flat; transparent: true; opacity: 1;"></a-plane>
      </a-entity>
    </a-entity>

  </a-scene>

</body>
</html>
