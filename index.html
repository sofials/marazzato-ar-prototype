<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Museo Marazzato — Three Timelines</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>

  <!-- Schermata intro -->
  <div id="intro">
    <h1>THREE TIMELINES</h1>
    <p class="subtitle">Una cornice. Tre tempi.</p>
    <p class="instructions">
      Tappa <strong>INIZIA</strong> e inquadra il marker.
    </p>
    <button id="start-btn">INIZIA</button>
  </div>

  <!-- Hint quando cerca il marker -->
  <div id="scan-hint" class="hidden">Inquadra il marker</div>

  <!-- Bottoni timeline -->
  <div id="timeline-controls" class="hidden">
    <button class="timeline-btn" data-timeline="past">PASSATO</button>
    <button class="timeline-btn active" data-timeline="present">PRESENTE</button>
    <button class="timeline-btn" data-timeline="future">FUTURO</button>
  </div>

  <!-- Scena AR con marker di test MindAR -->
  <a-scene mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
           color-space="sRGB"
           renderer="colorManagement: true, physicallyCorrectLights"
           vr-mode-ui="enabled: false"
           device-orientation-permission-ui="enabled: false">

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <!-- Cubo placeholder: lo sostituiremo con la cornice -->
      <a-box id="placeholder"
             position="0 0 0.1"
             rotation="0 0 0"
             width="0.6"
             height="0.4"
             depth="0.05"
             color="#C72A09"></a-box>
    </a-entity>
  </a-scene>

  <script src="script.js"></script>
</body>
</html>
